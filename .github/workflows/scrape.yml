name: Scrape Insurance Job Postings

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Copy data.json into docs (GitHub Pages 폴더)
        run: cp data.json docs/data.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json docs/data.json
          git diff --staged --quiet || git commit -m "chore: update job postings ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
